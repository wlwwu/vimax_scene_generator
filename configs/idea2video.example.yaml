# Idea2Video pipeline configuration template.
# Copy this to idea2video.yaml and fill in your API keys.

chat_model:
  init_args:
    model: 'MiniMax-M3'
    model_provider: openai
    api_key: <YOUR_API_KEY>
    base_url: https://api.minimaxi.com/v1
  # Rate limits for chat model API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 500
  max_requests_per_day: 2000

image_generator:
  class_path: tools.ImageGeneratorMiniMaxAPI
  init_args:
    api_key: <YOUR_API_KEY>
  # Rate limits for image generation API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 10
  max_requests_per_day: 500


video_generator:
  class_path: tools.VideoGeneratorDoubaoSeedanceYunwuAPI
  init_args:
    api_key: <YOUR_API_KEY>
    t2v_model: doubao-seedance-1-5-pro-251215
    ff2v_model: doubao-seedance-1-5-pro-251215
    flf2v_model: doubao-seedance-1-5-pro-251215
  # Rate limits for video generation API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 2
  max_requests_per_day: 10


working_dir: .working_dir/idea2video
